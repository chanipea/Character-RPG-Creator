<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton - Character Creator</title>
</head>
<body>
    
    <!-- =========================================
         (Raw Structural Skeleton)
         ========================================= -->

    <div class="book-container">
        
        <!-- Left Page: Canvas & Tools -->
        <div class="page">
            <h2>Create Character</h2>
            
            <div class="wireframe-box" style="height: 150px; text-align: center; line-height: 150px;">
                [ Canvas Placeholder ]
            </div>

            <div class="wireframe-box">
                <strong>Controls</strong><br><br>
                <label>Skin Color: <input type="color"></label><br>
                <label>Hair Color: <input type="color"></label>
            </div>
        </div>

        <!-- Book Spine -->
        <div class="spine"></div>

        <!-- Right Page: Form & Save -->
        <div class="page">
            <h2>Character Details</h2>
            
            <div class="wireframe-box">
                <label>Name: <input type="text" placeholder="Character Name"></label><br><br>
                <label>Birthday: <input type="text" placeholder="e.g. Spring 4"></label><br><br>
                <label>Loved Gifts: <input type="text" placeholder="Apples, Gems..."></label>
            </div>

            <button style="width: 100%; padding: 10px; cursor: pointer;">
                Save Character
            </button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab">Create</div>
            <div class="tab">Roster</div>
        </div>

    </div>

</body>
</html>
